<html>
    <head>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>
    <style>
        .democlass {
            color: red;
        }
    </style>
    <body>
        <h1 id="h1">I Love My INDIA</h1>
        <h2>The document.getElementById()method</h2>

        <p id="demo"></p>
        <p id="Deepak"></p>
               <div>
                <ul id="myList">
                    <li>Coffee</li>
                    <li>Water</li>
                    <li>Tea</li>
                    <li>Hot Water</li>
                    <li>Sugercane Juice</li>
                    <li>Musambi Juice</li>
                </ul>
            </div>
        <div style="border: 10px;">
        <input type="text">
        <button onclick="Deepak()">Click Me</button>
        <button onclick="Kumar()">Append</button>
        

        <script>
            document.getElementById("demo").innerHTML = "Hello World!";
           
           function Deepak() {
            document.getElementById("h1").setAttribute("class", "Democlass");
           } 

           function Kumar() {
            // Create an li node
            const node = document.createElement("li");
            // Create a text node:

            const textnode = document.createTextNode("Water");

            // Append the textnode to the "li" node

            node.appendChild(textnode);

            // Append the li node to the list

            document.getElementById("myList").appendChild(node);
           }


        </script>

     
        </div>
    </body>
</html>
